services:

  shell:
    build:
      context: ./apps/shell
      # Sem target: usa o estágio runner (produção) do Dockerfile
    ports:
      - "3010:3000"   # shell roda internamente em :3000 via `node server.js`
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # URLs dos spa.js devem apontar para localhost (resolvido pelo browser do usuário)
      # "dashboard:3001" não funciona no browser — só funciona dentro da rede Docker
      - NEXT_PUBLIC_DASHBOARD_SPA_URL=http://localhost:3001/spa.js
      - NEXT_PUBLIC_TRANSACTIONS_SPA_URL=http://localhost:3002/spa.js
      - NEXT_PUBLIC_ANALYTICS_SPA_URL=http://localhost:3003/spa.js
    depends_on:
      - backend
    networks:
      - bytebank-network
    # SEM volumes: bind mount sobrescreveria o build standalone e quebraria o servidor
    # SEM command: usa o CMD do Dockerfile ("node server.js")


  dashboard:
    build:
      context: ./apps/dashboard
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - bytebank-network
    # SEM volumes e SEM command: usa CMD do Dockerfile ("node server.js")


  transactions:
    build:
      context: ./apps/transactions
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - bytebank-network
    # SEM volumes e SEM command: usa CMD do Dockerfile ("node server.js")


  analytics:
    build:
      context: ./apps/analytics
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - bytebank-network
    # SEM volumes e SEM command: usa CMD do Dockerfile ("node server.js")


  backend:
    build:
      context: ../tc02-bytebank-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
    networks:
      - bytebank-network


  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bytebank-network


networks:
  bytebank-network:
    driver: bridge

volumes:
  mongo_data:
