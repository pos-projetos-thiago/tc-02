version: '3.8'

services:
  # Frontend Next.js (Aplicação principal)
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env.local
    networks:
      - bytebank-network
    depends_on:
      - backend
    restart: unless-stopped

  # Backend API (JWT)
  backend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../api-backend:/app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    command: >
      sh -c "
        if [ ! -d node_modules ]; then
          echo 'Instalando dependências do backend...';
          npm install;
        fi;
        echo 'Iniciando backend...';
        npm start
      "
    networks:
      - bytebank-network
    restart: unless-stopped

  # Nginx (Load Balancer e Proxy)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - bytebank-network
    restart: unless-stopped

networks:
  bytebank-network:
    driver: bridge

volumes:
  node_modules_backend: