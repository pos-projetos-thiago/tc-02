# Nginx Configuration for Microfrontends Architecture

events {
    worker_connections 1024;
}

http {
    upstream shell_upstream {
        server shell:3000;
    }

    upstream dashboard_upstream {
        server dashboard:3001;
    }

    upstream transactions_upstream {
        server transactions:3002;
    }

    upstream analytics_upstream {
        server analytics:3003;
    }

    upstream backend_upstream {
        server backend:4000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=frontend:10m rate=30r/s;

    server {
        listen 80;
        server_name localhost;

        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API routes (backend)
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Backend routes (user, account)
        location ~ ^/(user|account) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Dashboard microfrontend
        location /dashboard {
            limit_req zone=frontend burst=50 nodelay;
            proxy_pass http://dashboard_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Transactions microfrontend
        location /transactions {
            limit_req zone=frontend burst=50 nodelay;
            proxy_pass http://transactions_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Analytics microfrontend
        location /analytics {
            limit_req zone=frontend burst=30 nodelay;
            proxy_pass http://analytics_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Module Federation static files
        location /_next/static {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri @shell_fallback;
        }

        location /remoteEntry.js {
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
            
            # Try different microfrontends based on referrer or custom logic
            if ($http_referer ~ "dashboard") {
                proxy_pass http://dashboard_upstream;
                break;
            }
            if ($http_referer ~ "transactions") {
                proxy_pass http://transactions_upstream;
                break;
            }
            if ($http_referer ~ "analytics") {
                proxy_pass http://analytics_upstream;
                break;
            }
            
            # Default fallback
            proxy_pass http://shell_upstream;
        }

        # Shell app (default/fallback)
        location / {
            limit_req zone=frontend burst=50 nodelay;
            proxy_pass http://shell_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Fallback for shell
        location @shell_fallback {
            proxy_pass http://shell_upstream;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}